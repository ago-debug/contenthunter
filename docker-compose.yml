name: contenthunter-v5

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dismantler-v5-backend
    ports:
      - "55012:8000"
    volumes:
      - ./public:/app/public
    env_file:
      - .env
    restart: always

  ui:
    build:
      context: ./ui_v5
      dockerfile: Dockerfile
    container_name: dismantler-v5-ui
    ports:
      - "55010:3001"
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
    restart: always
