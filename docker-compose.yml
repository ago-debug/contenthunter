version: '3.8'
name: contenthunter-v5

services:
  # V5 DISMANTLER ENGINE (Python FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dismantler-v5-backend
    ports:
      - "55012:8000"
    volumes:
      - ./public:/app/public
    env_file:
      - .env
    restart: always

  # V5 INDUSTRIAL UI (Python Reflex)
  ui:
    build:
      context: ./v5_python
      dockerfile: Dockerfile
    container_name: dismantler-v5-ui
    ports:
      - "55010:3000"
      - "55011:8000"
    volumes:
      - ./public/uploads:/app/assets
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
